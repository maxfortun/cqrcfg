server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Auth token endpoint - exposes configured header value for JS to read
    # Used when UI is behind a proxy that sets auth headers
    location = /_auth {
        default_type application/json;
        add_header Cache-Control "no-cache, no-store";

        # Use Lua or njs to return header value, fallback to empty
        # For simplicity, we use a JS-based approach instead
        return 200 '{}';
    }

    # API proxy
    location /api/ {
        proxy_pass http://cqrcfg:3000/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # WebSocket proxy
    location /ws/ {
        proxy_pass http://cqrcfg:3000/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }

    # SPA fallback - serve index.html for all other routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Theme and config - no caching to allow runtime updates
    location = /theme.css {
        try_files /theme.css /themes/default.css =404;
        add_header Cache-Control "no-cache";
    }

    location = /config.js {
        add_header Cache-Control "no-cache";
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
